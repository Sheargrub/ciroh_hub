# Triggers a legacy-style CI/CD deployment.

name: 'CI: Trigger staging deployment from main'

on:
  push:
    branches:
     - main
     - test-deploy
    tags-ignore:
     - '*'
  workflow_dispatch:

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
    - name: 'Send repository dispatch'
      uses: peter-evans/repository-dispatch@v4
      with:
        repository: CIROH-UA/ciroh_hub
        event-type: build-main-for-production
        client-payload: '{"deploy_env": "staging", "base_url": "/staging/main/"}'
