# Triggers a CI/CD deployment from the main branch to staging.

name: 'CI: Trigger deployment from PR'
run-name: 'Trigger PR deployment on ref "${{github.ref}}"'

on:
  pull_request_target:
    types: [labeled, reopened, synchronize]

env:
  STAGING_REPO: ${{ vars.COMPOSITE_TARGET_REPO }}
  STAGING_PATH: staging/

jobs:
  trigger-build:
    if: contains(${{github.event.labels.*.name}}, 'Preview on staging')
    runs-on: ubuntu-latest
    steps:
    - name: 'Set deploy target'
      run: echo "DEPLOY_ENV=pr-staging" >> $GITHUB_ENV

    - name: 'Fetch commit header'
      run: \
        COMMIT_HEADER=$(git log -1 --pretty=%B | head -n 1)
        echo "COMMIT_HEADER=${COMMIT_MESSAGE_HEADER}" >> $GITHUB_ENV
      # Credit to the solution at https://github.com/orgs/community/discussions/106392

    - name: 'Send repository dispatch'
      uses: peter-evans/repository-dispatch@v4
      with:
        event-type: create-build
        client-payload: '{"deploy_env": "${{ env.DEPLOY_ENV }}", "target_repo": "${{ env.STAGING_REPO }}", "target_path": "${{ env.STAGING_PATH }}${{ github.event.number }}/", "commit_header": "${{ env.COMMIT_HEADER }}", "pr_number": "${{ github.event.number }}", "type_description": "PR #${{ github.event.number }} staging"}'
